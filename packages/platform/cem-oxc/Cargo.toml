[package]
name = "cem_oxc"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.10.5", features = ["serde-json"] }
napi-derive = "3.5.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
glob = "0.3"

oxc_parser = "0.15.0"
oxc_ast = "0.15.0"
oxc_allocator = "0.15.0"
oxc_span = "0.15.0"

[[bin]]
name = "cem-oxc-bin"
path = "src/bin.rs"

[build-dependencies]
napi-build = "2.3.2"
